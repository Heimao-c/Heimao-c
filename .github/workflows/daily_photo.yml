name: Update Daily Photo

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5   # ✅ Node 24 兼容

      - name: Update daily photo seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 使用 YYYYMMDD 作为 seed（稳定、可读）
          SEED=$(date -u +%Y%m%d)

          # 替换 README.md 中的 seed
          sed -E -i "s|picsum\.photos/seed/[0-9]+/|picsum.photos/seed/${SEED}/|g" README.md

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily photo seed to ${SEED}"
            git push
          fi
