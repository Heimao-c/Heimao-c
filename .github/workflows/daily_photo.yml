name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync, Update and Force Push
        run: |
          # 1. 设置身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 强制拉取云端最新改动并对齐，消除 rejected 隐患
          git fetch origin main
          git reset --hard origin/main
          
          # 3. 产生新的随机种子（时间戳）
          SEED=$(date +%s)
          # 精准替换 random= 后的参数
          sed -i "s/random=[^\"]*/random=${SEED}/g" README.md
          
          # 4. 提交并强制推送
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: update daily photo seed"
            # 既然没有分支保护，--force 是一劳永逸的方案
            git push origin main --force
          fi
