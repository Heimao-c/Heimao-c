name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 关键：强制切换到 main 分支的最前端
          ref: main

      - name: Force Sync and Update
        run: |
          # 1. 身份配置
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 暴力同步：强制让本地和云端完全一致
          git fetch origin main
          git reset --hard origin/main
          
          # 3. 生成随机种子并修改
          SEED=$(date +%s)
          sed -i "s/random=[^\"]*/random=${SEED}/g" README.md
          
          # 4. 提交并“暴力”推送
          git add README.md
          # 检查是否有改动，防止空提交报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily photo seed"
            # 使用 --force 强制覆盖云端，彻底解决 rejected 问题
            git push origin main --force
          fi
