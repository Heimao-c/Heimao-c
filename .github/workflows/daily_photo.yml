name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update and Push README
        run: |
          # 1. 配置机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 强制切换到 main 分支，并同步云端最新代码（化解 rejected 冲突的第一道防线）
          git checkout main
          git pull origin main --rebase
          
          # 3. 替换 README 中的随机种子为当前时间戳
          SEED=$(date +%s)
          sed -i "s/random=[^\"]*/random=${SEED}/g" README.md
          
          # 4. 提交并推送
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: update daily photo seed"
            # 5. 提交前再拉取一次，防止在刚才的几秒钟内云端发生变化（化解冲突的最后一道防线）
            git pull origin main --rebase
            git push origin main
          fi
