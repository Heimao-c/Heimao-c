name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史

      - name: Update README with Force Logic
        run: |
          # 1. 配置身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 强制同步云端最新状态，消除 [rejected] 隐患
          git fetch origin main
          git reset --hard origin main
          
          # 3. 修改随机种子（使用时间戳）
          SEED=$(date +%s)
          sed -i "s/random=[^\"]*/random=${SEED}/g" README.md
          
          # 4. 提交并强制推送
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: update daily photo seed"
            # 使用 --force 强制覆盖云端，彻底解决同步问题
            git push origin main --force
          fi
