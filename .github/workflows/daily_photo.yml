name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点执行
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Random Seed
        id: seed
        run: echo "STR=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          # 使用 sed 替换 README 中的占位符为当前时间戳（这会改变 URL）
          # 我们把 random= 后面的一串数字换成当前时间戳
          sed -i "s/random=[^\" ]*/random=${{ steps.seed.outputs.STR }}/g" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update daily photo seed" || exit 0
          git push
