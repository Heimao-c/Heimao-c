name: Update Daily Photo Seed

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 获取所有历史记录，这对解决冲突至关重要
          fetch-depth: 0

      - name: Generate Random Seed
        id: seed
        run: echo "STR=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          # 这一步会把 random= 后面直到双引号的内容替换为当前时间戳
          sed -i "s/random=[^\"]*/random=${{ steps.seed.outputs.STR }}/g" README.md

      - name: Commit & Push Changes
        # 使用专门处理自动提交的插件，它会自动处理 pull/rebase 逻辑
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily photo seed"
          branch: main
          # 如果有冲突，它会尝试重新拉取
          push_options: '--force'
